<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>За горизонт</title>
    
    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
    <!-- Подключаем Яндекс.Карты v3.0 -->
	    <script src="https://api-maps.yandex.ru/v3/?apikey=d9bce8a2-9d65-4ee3-aa8f-040b67cd9cd7&lang=ru_RU"></script>
		<script type="module" src="index.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #fff);
        }

        /* Контейнер для карты */
        #map {
            width: 100%;
            height: 100%;
        }

        /* Красивое кастомное окно внутри карты (в стиле Telegram) */
        .custom-balloon {
            padding: 12px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            max-width: 250px;
            font-size: 14px;
        }

        .balloon-title {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .map-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff) !important;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
            border: none;
            cursor: pointer;
            box-sizing: border-box;
        }
		
		.custom-balloon.hidden {
			display: none !important;
		}
		@import '@yandex/ymaps3-default-ui-theme/dist/esm/index.css';
    </style>
</head>
<body>

    <div id="map"></div>
	
</body>
</html>
