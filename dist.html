<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Расстояние до точки</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --paper: #f3ecdc;
    --paper-deep: #e9dfc7;
    --ink: #2b2420;
    --ink-soft: #6b5f4f;
    --road: #b3492c;
    --road-deep: #8e3a22;
    --pine: #4b6358;
    --line: #d8cba9;
    --gold: #b8923f;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Georgia', 'Iowan Old Style', 'PT Serif', serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background-image:
      radial-gradient(ellipse at top left, rgba(184,146,63,0.10), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(75,99,88,0.08), transparent 55%);
    min-height: 100vh;
    padding: 20px 16px 32px;
  }

  .wrap {
    max-width: 480px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 22px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }

  header::after {
    content: "";
    position: absolute;
    bottom: -3px;
    left: 50%;
    transform: translateX(-50%);
    width: 64px;
    height: 1px;
    background: var(--gold);
  }

  .eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--road);
    margin: 0 0 6px;
  }

  h1 {
    font-size: 24px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .subtitle {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 6px;
    font-style: italic;
  }

  .card {
    background: var(--paper-deep);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 18px;
    margin-bottom: 14px;
    position: relative;
  }

  .card-label {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .card-label .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--road);
    flex-shrink: 0;
  }

  .card-label.from .dot { background: var(--pine); }

  .place-name {
    font-size: 17px;
    font-weight: 700;
  }

  .place-coords {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  label.field-label {
    display: block;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 14px 0 6px;
  }

  input[type="text"] {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: #fffdf8;
    color: var(--ink);
    font-size: 15px;
    font-family: 'Courier New', monospace;
  }

  input[type="text"]:focus {
    outline: none;
    border-color: var(--road);
  }

  .hint {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 6px;
    line-height: 1.4;
  }

  button.primary {
    width: 100%;
    padding: 14px;
    margin-top: 18px;
    background: var(--road);
    color: #fff7ec;
    border: none;
    border-radius: 3px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.01em;
  }

  button.primary:active {
    background: var(--road-deep);
  }

  button.primary:disabled {
    background: #c9bda0;
    color: #fff;
    cursor: default;
  }

  .result {
    margin-top: 18px;
    padding: 18px;
    background: #fffdf8;
    border: 1px solid var(--gold);
    border-radius: 4px;
    display: none;
  }

  .result.show {
    display: block;
  }

  .result-line {
    font-size: 15px;
    line-height: 1.7;
    margin: 0;
  }

  .result-line + .result-line {
    margin-top: 4px;
  }

  .result-divider {
    height: 1px;
    background: var(--line);
    margin: 12px 0;
  }

  .result-preview-label {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }

  button.publish {
    width: 100%;
    padding: 14px;
    margin-top: 14px;
    background: var(--pine);
    color: #fff7ec;
    border: none;
    border-radius: 3px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }

  button.publish:active {
    background: #3a4f45;
  }

  .status {
    text-align: center;
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 10px;
    min-height: 18px;
  }

  .status.error {
    color: var(--road-deep);
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--line);
    border-top-color: var(--road);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  footer {
    text-align: center;
    margin-top: 24px;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <p class="eyebrow">Маршрутный лист</p>
    <h1>🧭 Расстояние до точки</h1>
    <p class="subtitle">Считаем км и время в пути по дорогам</p>
  </header>

  <div class="card">
    <div class="card-label from"><span class="dot"></span>Откуда</div>
    <div class="place-name">Стартовая точка</div>
    <div class="place-coords" id="originCoords"></div>
  </div>

  <div class="card">
    <div class="card-label"><span class="dot"></span>Куда</div>

    <label class="field-label">Название точки (для сообщения)</label>
    <input type="text" id="manualName" placeholder="Например: Выборг">
    <label class="field-label">Координаты (lat, lon)</label>
    <input type="text" id="manualCoords" placeholder="60.7128, 28.7442">
    <div class="hint">Скопируйте координаты из Яндекс.Карт или Google Maps долгим тапом на точке.</div>

    <button class="primary" id="calcBtn" disabled>Рассчитать расстояние</button>
    <div class="status" id="status"></div>
  </div>

  <div class="result" id="result">
    <p class="result-preview-label">Сообщение для публикации</p>
    <p class="result-line" id="resLine1"></p>
    <p class="result-line" id="resLine2"></p>
    <div class="result-divider"></div>
    <button class="publish" id="publishBtn">📤 Опубликовать в чат</button>
  </div>

  <footer>OSRM · OpenStreetMap routing</footer>
</div>

<script>
(function () {
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  // ---- Стартовая точка (постоянная) ----
  const ORIGIN = { lat: 59.841501, lon: 30.321593 };

  document.getElementById('originCoords').textContent =
    ORIGIN.lat.toFixed(5) + ', ' + ORIGIN.lon.toFixed(5);

  // ---- Целевая точка вводится вручную ----
  const manualName = document.getElementById('manualName');
  const manualCoords = document.getElementById('manualCoords');

  let calcResult = null; // { distanceKm, durationMin }

  function parseManualCoords() {
    const raw = manualCoords.value.trim();
    const m = raw.match(/(-?\d+(\.\d+)?)\s*,\s*(-?\d+(\.\d+)?)/);
    if (!m) return null;
    const lat = parseFloat(m[1]);
    const lon = parseFloat(m[3]);
    if (Number.isNaN(lat) || Number.isNaN(lon)) return null;
    if (lat < -90 || lat > 90 || lon < -180 || lon > 180) return null;
    return { lat, lon };
  }

  function updateCalcButton() {
    const calcBtn = document.getElementById('calcBtn');
    const coords = parseManualCoords();
    const name = manualName.value.trim();
    calcBtn.disabled = !coords || !name;
  }

  manualName.addEventListener('input', () => { updateCalcButton(); hideResult(); });
  manualCoords.addEventListener('input', () => { updateCalcButton(); hideResult(); });

  // ---- Расчёт маршрута через OSRM ----
  const OSRM_ENDPOINTS = [
    'https://router.project-osrm.org/route/v1/driving/',
    'https://routing.openstreetmap.de/routed-car/route/v1/driving/'
  ];

  async function fetchRoute(from, to) {
    const coordStr = from.lon + ',' + from.lat + ';' + to.lon + ',' + to.lat;
    let lastError = null;

    for (const base of OSRM_ENDPOINTS) {
      try {
        const url = base + coordStr + '?overview=false';
        const resp = await fetch(url);
        if (!resp.ok) { lastError = new Error('HTTP ' + resp.status); continue; }
        const data = await resp.json();
        if (data.code !== 'Ok' || !data.routes || !data.routes.length) {
          lastError = new Error('Маршрут не найден');
          continue;
        }
        const route = data.routes[0];
        return {
          distanceKm: route.distance / 1000,
          durationMin: route.duration / 60
        };
      } catch (e) {
        lastError = e;
      }
    }
    throw lastError || new Error('Сервис маршрутов недоступен');
  }

  function formatDuration(totalMinutes) {
    const m = Math.round(totalMinutes);
    const h = Math.floor(m / 60);
    const min = m % 60;
    if (h === 0) return min + ' мин.';
    if (min === 0) return h + ' ч.';
    return h + ' ч. ' + min + ' мин.';
  }

  const statusEl = document.getElementById('status');
  const calcBtn = document.getElementById('calcBtn');
  const resultEl = document.getElementById('result');
  const resLine1 = document.getElementById('resLine1');
  const resLine2 = document.getElementById('resLine2');

  function hideResult() {
    resultEl.classList.remove('show');
    calcResult = null;
  }

  function setStatus(text, isError) {
    statusEl.textContent = text || '';
    statusEl.classList.toggle('error', !!isError);
  }

  calcBtn.addEventListener('click', async () => {
    const coords = parseManualCoords();
    const name = manualName.value.trim();
    if (!coords || !name) return;
    const target = { name, lat: coords.lat, lon: coords.lon };

    calcBtn.disabled = true;
    setStatus('');
    setStatus('Считаем маршрут…');
    hideResult();

    try {
      const route = await fetchRoute(ORIGIN, target);
      calcResult = {
        targetName: target.name,
        distanceKm: Math.round(route.distanceKm),
        durationText: formatDuration(route.durationMin)
      };

      resLine1.textContent = '🧭 Расстояние до ' + target.name + ' по дорогам составляет ' + calcResult.distanceKm + ' км.';
      resLine2.textContent = '🚗 Время в пути примерно: ' + calcResult.durationText;
      resultEl.classList.add('show');
      setStatus('');

      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    } catch (e) {
      setStatus('Не удалось рассчитать маршрут. Проверьте соединение и попробуйте ещё раз.', true);
      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
    } finally {
      calcBtn.disabled = false;
    }
  });

  // ---- Публикация: открываем системный диалог "Переслать/Отправить" ----
  document.getElementById('publishBtn').addEventListener('click', () => {
    if (!calcResult) return;
    const text =
      '🧭 Расстояние до ' + calcResult.targetName + ' по дорогам составляет ' + calcResult.distanceKm + ' км.\n' +
      '🚗 Время в пути примерно: ' + calcResult.durationText;

    if (tg?.switchInlineQuery) {
      // Внутри Telegram: открываем выбор чата с готовым текстом
      try {
        tg.switchInlineQuery(text, ['users', 'groups']);
        return;
      } catch (e) {
        // падаем в fallback ниже
      }
    }

    if (tg?.openTelegramLink) {
      const shareUrl = 'https://t.me/share/url?url=&text=' + encodeURIComponent(text);
      tg.openTelegramLink(shareUrl);
      return;
    }

    // Фоллбек вне Telegram (для отладки в обычном браузере)
    navigator.clipboard?.writeText(text);
    alert('Текст скопирован в буфер обмена:\n\n' + text);
  });

})();
</script>

</body>
</html>
